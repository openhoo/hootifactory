# Local dev infrastructure for Hootifactory.
# Brings up Postgres + MinIO (S3) and creates the artifact bucket.
# Run the api/web/scan-worker locally with `bun run dev` against these,
# or run the full stack with: docker compose --profile app up --build
x-app-env: &app-env
  # This is a LOCAL demo stack: run it in development mode so the production
  # secret-guard (which forbids these well-known dev credentials and requires a
  # configured registry JWT keypair) does not block startup. A real deployment
  # uses the image's NODE_ENV=production default with real secrets, where the
  # guard is enforced.
  NODE_ENV: development
  DATABASE_URL: postgres://${COMPOSE_POSTGRES_USER:-hootifactory}:${COMPOSE_POSTGRES_PASSWORD:-hootifactory}@postgres:5432/${COMPOSE_POSTGRES_DB:-hootifactory}
  S3_ENDPOINT: http://minio:9000
  S3_FORCE_PATH_STYLE: "true"
  S3_ACCESS_KEY_ID: ${COMPOSE_MINIO_ROOT_USER:-hootifactory}
  S3_SECRET_ACCESS_KEY: ${COMPOSE_MINIO_ROOT_PASSWORD:-hootifactory}
  S3_BUCKET: ${COMPOSE_S3_BUCKET:-hootifactory}
  APP_PUBLIC_URL: http://localhost:3000
  REGISTRY_ALLOW_PRIVATE_UPSTREAMS: "false"
  EMAIL_ENABLED: "true"
  EMAIL_FROM: Hootifactory <noreply@localhost>
  EMAIL_SMTP_HOST: mailpit
  EMAIL_SMTP_PORT: "1025"
  EMAIL_SMTP_SECURE: "false"
  SCANNER_ENABLED: "true"
  # The app image does not include Docker or mount the host Docker socket.
  # Keep the local demo stack heuristic-only unless a scanner runtime is added.
  SCANNER_CLI_RUNTIME: disabled
  SCANNER_DOCKER_COMMAND: docker
  # Per-scanner plugin config — passed through as env and read by each scanner
  # plugin (not the app core). Optionally narrow the active set with SCANNERS.
  GRYPE_IMAGE: anchore/grype:latest@sha256:e5b03c0ec0bc20a9eaaf84c2dcc97d9890f4dfb4381fce26bffc7dd8527c3d9d
  TRIVY_IMAGE: aquasec/trivy:latest@sha256:016eae51fdcf989332a5404af7e8f625cd5d95d7c0907a221d080a996f556500
  CLAMAV_IMAGE: clamav/clamav:latest@sha256:d4000290254603e7ee45d4904425c7d98c015af727f402756198fe41a31e7777
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
  OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}

services:
  postgres:
    image: postgres:18@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${COMPOSE_POSTGRES_USER:-hootifactory}
      POSTGRES_PASSWORD: ${COMPOSE_POSTGRES_PASSWORD:-hootifactory}
      POSTGRES_DB: ${COMPOSE_POSTGRES_DB:-hootifactory}
      POSTGRES_INITDB_ARGS: --auth-local=scram-sha-256 --auth-host=scram-sha-256
    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${COMPOSE_MINIO_ROOT_USER:-hootifactory}
      MINIO_ROOT_PASSWORD: ${COMPOSE_MINIO_ROOT_PASSWORD:-hootifactory}
    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:9000:9000"
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot: wait for MinIO, then create the bucket (idempotent).
  minio-setup:
    image: minio/mc:latest@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${COMPOSE_MINIO_ROOT_USER:-hootifactory}
      MINIO_ROOT_PASSWORD: ${COMPOSE_MINIO_ROOT_PASSWORD:-hootifactory}
      S3_BUCKET: ${COMPOSE_S3_BUCKET:-hootifactory}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do
        echo 'waiting for minio...'; sleep 1;
      done &&
      mc mb --ignore-existing \"local/$$S3_BUCKET\" &&
      mc anonymous set none \"local/$$S3_BUCKET\" &&
      echo 'bucket ready'
      "

  mailpit:
    image: axllent/mailpit:latest@sha256:3bd7c2f2696deb35a4780d152b404dceec99cb041b942c0877b3b22384714f85
    restart: unless-stopped
    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:1025:1025"
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:8025:8025"

  # ── optional scanner services (Phase 3) ──────────────────────────────────
  clamav:
    image: clamav/clamav:latest@sha256:d4000290254603e7ee45d4904425c7d98c015af727f402756198fe41a31e7777
    profiles: ["scan"]
    restart: unless-stopped
    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:3310:3310"

  trivy:
    image: aquasec/trivy:latest@sha256:016eae51fdcf989332a5404af7e8f625cd5d95d7c0907a221d080a996f556500
    profiles: ["scan"]
    command: server --listen 0.0.0.0:4954
    restart: unless-stopped
    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:4954:4954"
    volumes:
      - trivycache:/root/.cache/trivy

  # ── full application stack (docker compose --profile app up --build) ──────
  migrate:
    profiles: ["app"]
    build: .
    command: ["bun", "run", "db:migrate"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    profiles: ["app"]
    build: .
    restart: unless-stopped
    environment:
      <<: *app-env
      REGISTRY_PUBLIC_URL: http://localhost:3000
    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  mail-worker:
    profiles: ["app"]
    build: .
    restart: unless-stopped
    command: ["bun", "run", "apps/mail-worker/src/worker.ts"]
    environment:
      <<: *app-env
      WORKER_PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:'+(process.env.WORKER_PORT||3001)+'/worker/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  scan-worker:
    profiles: ["app"]
    build: .
    restart: unless-stopped
    command: ["bun", "run", "apps/scan-worker/src/worker.ts"]
    environment:
      <<: *app-env
      WORKER_PORT: "3002"
    depends_on:
      postgres:
        condition: service_healthy
      # The worker reads blobs from object storage, so wait for the bucket too.
      minio-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:'+(process.env.WORKER_PORT||3002)+'/worker/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
  trivycache:
